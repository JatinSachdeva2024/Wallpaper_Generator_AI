[build]
builder = "nixpacks"
# Install devDependencies (vite, typescript) — required for npm run build
buildCommand = "npm install --include=dev && npm run build"

[deploy]
# dist is built in the build phase; only start the API + static server
startCommand = "npm run start:server"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
